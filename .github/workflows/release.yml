# Release 工作流：打包本项目源码为 .zip / .tar.gz 并发布 GitHub Release
# 触发方式：
#   1. 推送 v 开头的 tag（如 v2.1.0）→ 正式 Release
#   2. 手动触发（workflow_dispatch）→ Draft Release，便于人工核对后再发布

name: Release

on:
  push:
    tags: ["v*.*.*"]
      
  workflow_dispatch:
    inputs:
      version:
        description: '版本号，需以 v 开头（如 v0.1.0）'
        required: true
        default: 'v0.1.0'

# Release 需要写权限以创建 tag / 发布 Release
permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 解析版本号与发布模式
        id: meta
        run: |
          # tag 触发取 tag 名；手动触发取输入的版本号
          if [ "${GITHUB_EVENT_NAME}" = "workflow_dispatch" ]; then
            VERSION="${{ github.event.inputs.version }}"
            DRAFT="true"
          else
            VERSION="${GITHUB_REF_NAME}"
            DRAFT="false"
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "draft=${DRAFT}" >> "$GITHUB_OUTPUT"
          echo "本次发布：version=${VERSION} draft=${DRAFT}"

      - name: 生成 .zip 与 .tar.gz 打包文件
        env:
          VERSION: ${{ steps.meta.outputs.version }}
        run: |
          # git archive 自动遵循 .gitignore，仅打包 git 跟踪的文件
          # --prefix 让解压后有一个顶层目录（源码包惯例）
          git archive --format=zip --prefix=trae-agent-skills-${VERSION}/ HEAD -o trae-agent-skills-${VERSION}.zip
          git archive --format=tar.gz --prefix=trae-agent-skills-${VERSION}/ HEAD -o trae-agent-skills-${VERSION}.tar.gz
          # 列出产物大小作为自检
          ls -lh trae-agent-skills-${VERSION}.zip trae-agent-skills-${VERSION}.tar.gz

      - name: 发布 GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.version }}
          name: ${{ steps.meta.outputs.version }}
          # 手动触发 → Draft；tag 触发 → 正式发布
          draft: ${{ steps.meta.outputs.draft }}
          # 由 GitHub 根据 commits 自动生成 Release Notes
          generate_release_notes: true
          files: |
            trae-agent-skills-${{ steps.meta.outputs.version }}.zip
            trae-agent-skills-${{ steps.meta.outputs.version }}.tar.gz
